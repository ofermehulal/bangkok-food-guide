  }
];

const hoodOrder = [
  "Sukhumvit",
  "Chinatown",
  "Phra Nakhon",
  "Siam / Pathum Wan",
  "Chula / Samyan",
  "Khlong San / Icon Siam",
  "Bang Rak",
  "Airport (BKK)",
  "Other"
];
const main = document.getElementById('main');
const filters = document.getElementById('filters');
let active = 'All';
function badge(b) { return b === 'michelin' ? '●' : b === 'star' ? '★' : ''; }
function render() {
  main.innerHTML = '';
  const list = active === 'All' ? places : places.filter(p => p.hood === active);
  const order = active === 'All' ? hoodOrder : [active];
  order.forEach(h => {
    const items = list.filter(p => p.hood === h);
    if (!items.length) return;
    const chapter = document.createElement('section');
    chapter.className = 'chapter';
    chapter.innerHTML = '<div class="chapter-header"><h2>' + h + '</h2><div class="count">' + items.length + ' ' + (items.length === 1 ? 'spot' : 'spots') + '</div></div><div class="grid"></div>';
    const grid = chapter.querySelector('.grid');
    items.forEach((p, i) => {
      const isHero = i === 0 && items.length > 1 && active === 'All';
      const mapsUrl = 'https://www.google.com/maps/search/?api=1&query=' + encodeURIComponent(p.search);
      const img = p.photo
        ? '<img src="' + p.photo + '" alt="' + p.name + '" loading="lazy">'
        : '<div class="no-photo">' + p.name.charAt(0) + '</div>';
      const badges = (p.badges || []).map(badge).join(' ');
      const card = document.createElement('article');
      card.className = 'card' + (isHero ? ' hero-card' : '');
      card.innerHTML =
        '<div class="img-wrap">' + img + '</div>' +
        '<h3>' + p.name + (badges ? ' <span class="badges">' + badges + '</span>' : '') + '</h3>' +
        '<p class="desc">' + p.desc + '</p>' +
        '<div class="meta"><span>' + (p.meta || '').split(',')[0] + '</span><a href="' + mapsUrl + '" target="_blank">Maps →</a></div>';
      grid.appendChild(card);
    });
    main.appendChild(chapter);
  });
}
['All', ...hoodOrder].forEach(h => {
  const b = document.createElement('button');
  b.className = 'chip' + (h === 'All' ? ' active' : '');
  b.textContent = h;
  b.onclick = () => {
    active = h;
    document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
    b.classList.add('active');
    render();
  };
  filters.appendChild(b);
});
render();
</script>
</body>
</html>
