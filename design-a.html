      const photo = p.photo
        ? '<img src="' + p.photo + '" alt="' + p.name + '" loading="lazy">'
        : '<div class="no-photo">🍜</div>';
      const badges = (p.badges || []).map(badgeEmoji).join('');
      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = photo +
        '<div class="gradient"></div>' +
        '<div class="content">' +
          '<span class="hood-chip">' + p.hood + '</span>' +
          '<h3>' + p.name + (badges ? '<span class="badges">' + badges + '</span>' : '') + '</h3>' +
          '<p>' + p.desc + '</p>' +
          '<div class="actions">' +
            '<a class="btn primary" href="' + mapsUrl + '" target="_blank">Open in Maps →</a>' +
          '</div>' +
        '</div>';
      feed.appendChild(card);
    });
  });
  countEl.textContent = list.length + ' spots';
}
['All', ...hoodOrder].forEach(h => {
  const b = document.createElement('button');
  b.className = 'hood-tab' + (h === 'All' ? ' active' : '');
  b.textContent = h;
  b.onclick = () => {
    activeHood = h;
    document.querySelectorAll('.hood-tab').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
    render();
  };
  tabs.appendChild(b);
});
render();
</script>
</body>
</html>
