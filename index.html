let activeFilter = 'All';

const allHoods = ['All', ...hoodOrder];
allHoods.forEach(h => {
  const btn = document.createElement('button');
  btn.className = 'filter-btn' + (h === 'All' ? ' active' : '');
  btn.textContent = h;
  btn.onclick = () => {
    activeFilter = h;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render();
  };
  filtersDiv.appendChild(btn);
});

function badgeHtml(badges) {
  if (!badges) return '';
  const map = {
    michelin: { cls: 'michelin', text: 'Michelin Bib' },
    star: { cls: 'star', text: '★ Michelin Star' }
  };
  return '<span class="badges">' + badges.map(b => {
    const m = map[b];
    return `<span class="badge ${m.cls}">${m.text}</span>`;
  }).join('') + '</span>';
}

function mapsUrl(q) {
  return 'https://www.google.com/maps/search/?api=1&query=' + encodeURIComponent(q);
}

function render() {
  const q = searchInput.value.trim().toLowerCase();
  const filtered = places.filter(p => {
    if (activeFilter !== 'All' && p.hood !== activeFilter) return false;
    if (!q) return true;
    const hay = (p.name + ' ' + p.desc + ' ' + p.meta + ' ' + p.hood).toLowerCase();
    return hay.includes(q);
  });

  countDiv.textContent = filtered.length + (filtered.length === 1 ? ' place' : ' places');

  if (filtered.length === 0) {
    main.innerHTML = '<div class="empty">No places match that search.</div>';
    return;
  }

  const grouped = {};
  filtered.forEach(p => {
    if (!grouped[p.hood]) grouped[p.hood] = [];
    grouped[p.hood].push(p);
  });

  let html = '';
  hoodOrder.forEach(h => {
    if (!grouped[h]) return;
    html += `<div class="neighborhood"><h2>${h}</h2>`;
    grouped[h].forEach(p => {
      const photoHtml = p.photo
        ? `<div class="photo" style="background-image:url('${p.photo}')"></div>`
        : `<div class="photo no-photo">🍜</div>`;
      html += `
        <div class="card">
          ${photoHtml}
          <div class="body">
            <h3>${p.name}${badgeHtml(p.badges)}</h3>
            <div class="desc">${p.desc}</div>
            <div class="meta">📍 ${p.meta}</div>
            <a class="maps-link" href="${mapsUrl(p.search)}" target="_blank" rel="noopener">Open in Google Maps →</a>
          </div>
        </div>
      `;
    });
    html += `</div>`;
  });
  main.innerHTML = html;
}

searchInput.addEventListener('input', render);
render();
</script>

</body>
</html>
