<style>
  /* ── Neon Night Market tokens ──────────────────────────── */
  :root {
    --bg: #0f1220;
    --bg2: #171a2e;
    --panel: #1e2236;
    --panel2: #252943;
    --ink: #f5f1e8;
    --mute: #8a8faa;
    --dim: #5a5f7a;
    --hair: rgba(255,255,255,0.08);
    --hair-bright: rgba(255,255,255,0.15);
    --red: #ff4d3d;
    --green: #4dd89e;
    --yellow: #ffd23f;
    --display: 'Fraunces', 'DM Serif Display', Georgia, serif;
    --sans: 'Inter', -apple-system, system-ui, sans-serif;
    --mono: ui-monospace, 'SF Mono', Menlo, monospace;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { background: var(--bg); color: var(--ink); font-family: var(--sans); }
  body { line-height: 1.5; padding-bottom: 80px; overflow-x: hidden; }
  button { font: inherit; cursor: pointer; }
  a { color: inherit; text-decoration: none; }

  /* container — phone-width column centered on desktop */
  .shell { max-width: 480px; margin: 0 auto; padding: 0 20px; }

  /* ── Header ─────────────────────────────────────────────── */
  header.hero { padding: 24px 0 16px; }
  .live-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
  .live-tag {
    font-family: var(--mono); font-size: 11px; color: var(--yellow);
    letter-spacing: 2px; text-transform: uppercase; font-weight: 700;
  }
  .avatar {
    width: 32px; height: 32px; background: var(--red); color: white;
    display: flex; align-items: center; justify-content: center;
    font-family: var(--display); font-weight: 500; font-size: 15px;
    border-radius: 0;
  }
  h1.display {
    font-family: var(--display); font-weight: 500;
    font-size: 64px; line-height: 0.85; letter-spacing: -2.5px;
  }
  h1.display em { font-style: italic; color: var(--red); font-weight: 500; }
  .sub-mono {
    font-family: var(--mono); font-size: 12px; color: var(--mute);
    margin-top: 14px; letter-spacing: 0.5px;
  }

  /* ── Red ticker bar ─────────────────────────────────────── */
  .ticker {
    background: var(--red); color: var(--bg);
    padding: 9px 14px; border-radius: 4px;
    display: flex; align-items: center; gap: 10px; margin-bottom: 18px;
    font-family: var(--mono); font-size: 11px; letter-spacing: 0.8px;
    text-transform: uppercase; overflow: hidden; white-space: nowrap;
  }
  .ticker strong { font-weight: 700; }
  .ticker a { color: var(--bg); font-weight: 700; text-decoration: underline; text-underline-offset: 2px; }

  /* ── Neighborhood filter chips ──────────────────────────── */
  .hoods {
    display: flex; gap: 6px; overflow-x: auto; padding-bottom: 14px;
    scrollbar-width: none;
    position: sticky; top: 0; z-index: 10;
    background: linear-gradient(to bottom, var(--bg) 70%, rgba(15,18,32,0));
    padding-top: 4px;
  }
  .hoods::-webkit-scrollbar { display: none; }
  .hood-btn {
    flex-shrink: 0; padding: 7px 14px; border-radius: 2px;
    border: 1px solid var(--hair); background: transparent;
    color: var(--mute); font-family: var(--mono);
    font-size: 11px; letter-spacing: 1px; text-transform: uppercase;
    font-weight: 700;
  }
  .hood-btn:hover { border-color: var(--hair-bright); color: var(--ink); }
  .hood-btn.active { background: var(--ink); color: var(--bg); border-color: var(--ink); }

  /* ── Section divider (neighborhood banner between groups) */
  .section-banner {
    display: flex; align-items: center; gap: 10px; margin: 28px 0 14px;
    font-family: var(--mono); font-size: 10px; color: var(--yellow);
    letter-spacing: 2px; text-transform: uppercase; font-weight: 700;
  }
  .section-banner::before, .section-banner::after {
    content: ''; flex: 1; height: 1px; background: var(--hair);
  }

  /* ── Hero cards ─────────────────────────────────────────── */
  .card {
    margin-bottom: 20px; cursor: pointer;
    display: block; color: inherit;
  }
  .card .photo-wrap {
    height: 260px; position: relative; overflow: hidden;
    border-radius: 4px; background: var(--panel);
  }
  .card .slide {
    position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover;
    opacity: 0; transition: opacity 0.35s ease; z-index: 1;
  }
  .card .slide.active { opacity: 1; z-index: 2; }
  .card .no-photo {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    color: var(--dim); font-size: 48px;
  }
  .card .idx {
    position: absolute; top: 10px; left: 14px;
    font-family: var(--display); font-weight: 500;
    font-size: 72px; line-height: 0.8; letter-spacing: -3px;
    color: var(--ink); mix-blend-mode: overlay;
    z-index: 4; pointer-events: none;
  }
  .card .badges {
    position: absolute; top: 14px; right: 12px;
    display: flex; flex-direction: column; gap: 6px; align-items: flex-end;
    z-index: 5;
  }
  .card .badge {
    padding: 4px 10px; border-radius: 999px;
    font-family: var(--mono); font-size: 10px; font-weight: 700;
    letter-spacing: 1px; text-transform: uppercase;
  }
  .card .badge.michelin { background: var(--yellow); color: var(--bg); }
  .card .badge.star { background: var(--yellow); color: var(--bg); }
  .card .gradient {
    position: absolute; inset: 0;
    background: linear-gradient(to top, rgba(0,0,0,0.88) 0%, rgba(0,0,0,0.25) 45%, transparent 70%);
    z-index: 3; pointer-events: none;
  }
  .card .photo-content {
    position: absolute; left: 16px; right: 16px; bottom: 14px;
    z-index: 5;
  }
  .card .micro {
    font-family: var(--mono); font-size: 10px; color: var(--yellow);
    letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 4px;
    font-weight: 700;
  }
  .card h3 {
    font-family: var(--display); font-weight: 500;
    font-size: 30px; line-height: 1; letter-spacing: -0.8px; color: #fff;
  }

  /* carousel dots + arrows */
  .dots {
    position: absolute; top: 12px; left: 14px; right: 14px;
    display: flex; justify-content: flex-end; gap: 4px;
    z-index: 6; pointer-events: none;
  }
  .dot {
    width: 16px; height: 2px; background: rgba(255,255,255,0.35);
    pointer-events: auto; border: none; padding: 0; cursor: pointer;
    transition: background 0.15s;
  }
  .dot.active { background: white; }
  .arrow {
    position: absolute; top: 50%; transform: translateY(-50%);
    width: 34px; height: 34px; border-radius: 0;
    background: rgba(0,0,0,0.5);
    backdrop-filter: blur(6px);
    border: 1px solid var(--hair-bright);
    color: white; font-size: 20px; line-height: 1;
    display: flex; align-items: center; justify-content: center;
    opacity: 0; transition: opacity 0.15s, background 0.15s;
    z-index: 6;
  }
  .arrow:hover { background: rgba(0,0,0,0.75); }
  .arrow.prev { left: 10px; }
  .arrow.next { right: 10px; }
  .card:hover .arrow { opacity: 1; }
  @media (hover: none) { .arrow { opacity: 1; } }

  /* footer strip below photo — description + neighborhood */
  .strip {
    background: var(--panel);
    padding: 12px 14px;
    display: flex; flex-direction: column; gap: 6px;
    border-top: 3px solid var(--red);
  }
  .strip .desc {
    font-family: var(--sans); font-size: 13.5px; color: var(--ink);
    line-height: 1.45;
  }
  .strip .meta-row {
    display: flex; gap: 10px; align-items: center;
    font-family: var(--mono); font-size: 10px; color: var(--mute);
    letter-spacing: 1px; text-transform: uppercase;
  }
  .strip .meta-row .sep { color: var(--hair-bright); }
  .strip .meta-row a {
    color: var(--red); font-weight: 700; margin-left: auto;
  }
  .strip .meta-row a:hover { text-decoration: underline; text-underline-offset: 2px; }

  /* count at bottom */
  .count {
    font-family: var(--mono); font-size: 10px; color: var(--dim);
    letter-spacing: 1.5px; text-transform: uppercase; text-align: center;
    padding: 24px 0 12px;
  }

  /* responsive tweaks */
  @media (max-width: 420px) {
    .shell { padding: 0 16px; }
    h1.display { font-size: 54px; letter-spacing: -2px; }
    .card .photo-wrap { height: 240px; }
    .card .idx { font-size: 64px; }
    .card h3 { font-size: 26px; }
  }
</style>

const hoodOrder = [
  "Sukhumvit",
  "Chinatown",
  "Phra Nakhon",
  "Siam / Pathum Wan",
  "Chula / Samyan",
  "Khlong San / Icon Siam",
  "Bang Rak",
  "Airport (BKK)",
  "Other"

// Live clock in Bangkok time
function updateLive() {
  const now = new Date();
  const bkk = new Date(now.toLocaleString('en-US', { timeZone: 'Asia/Bangkok' }));
  const hh = String(bkk.getHours()).padStart(2, '0');
  const mm = String(bkk.getMinutes()).padStart(2, '0');
  document.getElementById('liveTag').textContent = '◉ LIVE · ' + hh + ':' + mm + ' ICT';
}
updateLive();
setInterval(updateLive, 30000);

const hoods = document.getElementById('hoods');
const feed = document.getElementById('feed');
const countEl = document.getElementById('count');
let activeHood = 'All';

function badge(b) {
  if (b === 'michelin') return '<div class="badge michelin">★ Michelin</div>';
  if (b === 'star') return '<div class="badge star">★ Michelin</div>';
  return '';
}

function render() {
  feed.innerHTML = '';
  const list = activeHood === 'All' ? places : places.filter(p => p.hood === activeHood);

  // Group by hood, preserving global index across All
  const grouped = {};
  list.forEach(p => { (grouped[p.hood] = grouped[p.hood] || []).push(p); });
  const order = activeHood === 'All' ? hoodOrder : [activeHood];
  let globalIdx = 0;
  order.forEach(h => {
    if (!grouped[h]) return;
    if (activeHood === 'All') {
      const banner = document.createElement('div');
      banner.className = 'section-banner';
      banner.textContent = h;
      feed.appendChild(banner);
    }
    grouped[h].forEach(p => {
      globalIdx++;
      const n = String(globalIdx).padStart(2, '0');
      const mapsUrl = 'https://www.google.com/maps/search/?api=1&query=' + encodeURIComponent(p.search);
      const photos = (p.photos && p.photos.length) ? p.photos : (p.photo ? [p.photo] : []);

      let photoHtml;
      if (photos.length === 0) {
        photoHtml = '<div class="no-photo">🍜</div>';
      } else {
        const slides = photos.map((url, i) =>
          '<img class="slide' + (i === 0 ? ' active' : '') + '" src="' + url + '" alt="' + p.name + '" loading="lazy" referrerpolicy="no-referrer">'
        ).join('');
        const dots = photos.length > 1
          ? '<div class="dots">' + photos.map((_, i) => '<button class="dot' + (i === 0 ? ' active' : '') + '" data-i="' + i + '" aria-label="Photo ' + (i+1) + '"></button>').join('') + '</div>'
          : '';
        const arrows = photos.length > 1
          ? '<button class="arrow prev" aria-label="Previous">‹</button><button class="arrow next" aria-label="Next">›</button>'
          : '';
        photoHtml = slides + arrows + dots;
      }

      const badgesHtml = (p.badges || []).map(badge).join('');
      const card = document.createElement('a');
      card.className = 'card';
      card.href = mapsUrl;
      card.target = '_blank';
      card.rel = 'noopener';
      card.innerHTML =
        '<div class="photo-wrap">' +
          photoHtml +
          '<div class="idx">' + n + '</div>' +
          (badgesHtml ? '<div class="badges">' + badgesHtml + '</div>' : '') +
          '<div class="gradient"></div>' +
          '<div class="photo-content">' +
            '<div class="micro">' + p.hood + '</div>' +
            '<h3>' + p.name + '</h3>' +
          '</div>' +
        '</div>' +
        '<div class="strip">' +
          '<div class="desc">' + p.desc + '</div>' +
          '<div class="meta-row">' +
            '<span>' + (p.meta || '').split(',')[0] + '</span>' +
            '<a href="' + mapsUrl + '" target="_blank" rel="noopener" onclick="event.stopPropagation()">Maps ↗</a>' +
          '</div>' +
        '</div>';

      // Wire up carousel
      if (photos.length > 1) {
        const wrap = card.querySelector('.photo-wrap');
        const slideEls = wrap.querySelectorAll('.slide');
        const dotEls = wrap.querySelectorAll('.dot');
        let idx = 0;
        const go = (nx) => {
          idx = (nx + photos.length) % photos.length;
          slideEls.forEach((s, i) => s.classList.toggle('active', i === idx));
          dotEls.forEach((d, i) => d.classList.toggle('active', i === idx));
        };
        const stop = (e) => { e.preventDefault(); e.stopPropagation(); };
        wrap.querySelector('.prev').addEventListener('click', (e) => { stop(e); go(idx - 1); });
        wrap.querySelector('.next').addEventListener('click', (e) => { stop(e); go(idx + 1); });
        dotEls.forEach((d) => d.addEventListener('click', (e) => { stop(e); go(parseInt(d.dataset.i, 10)); }));
      }

      feed.appendChild(card);
    });
  });
  countEl.textContent = list.length + ' spots';
  document.getElementById('subMono').textContent = places.length + ' spots · curated from Instagram saves';
}

// Hood filter chips
['All', ...hoodOrder].forEach(h => {
  const b = document.createElement('button');
  b.className = 'hood-btn' + (h === 'All' ? ' active' : '');
  b.textContent = h;
  b.onclick = () => {
    activeHood = h;
    document.querySelectorAll('.hood-btn').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
    render();
  };
  hoods.appendChild(b);
});

render();
